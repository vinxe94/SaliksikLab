services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: thesis_repo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d thesis_repo"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      SECRET_KEY: django-insecure-change-me-in-production
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1,backend,0.0.0.0,.ngrok-free.app,.ngrok.app,.ngrok-free.dev,.ngrok.dev,.ngrok.io,.trycloudflare.com"
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173
      CORS_ALLOWED_ORIGIN_REGEXES: "^https://.*\\.ngrok-free\\.app$,^https://.*\\.ngrok\\.app$,^https://.*\\.ngrok-free\\.dev$,^https://.*\\.ngrok\\.dev$,^https://.*\\.ngrok\\.io$,^https://.*\\.trycloudflare\\.com$"
      CSRF_TRUSTED_ORIGINS: "https://*.ngrok-free.app,https://*.ngrok.app,https://*.ngrok-free.dev,https://*.ngrok.dev,https://*.ngrok.io,https://*.trycloudflare.com"
      FRONTEND_URL: http://localhost:3000
      DB_NAME: thesis_repo
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: "5432"
    volumes:
      - backend_media:/app/media
      - backend_static:/app/staticfiles
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_media:
  backend_static:
